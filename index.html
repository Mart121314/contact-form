<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontakt oss – Eikefet IT Utvikling</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --muted: #5a6472;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --border: #e2e6ea;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161a;
      --card-bg: #1e2126;
      --text: #f0f2f4;
      --muted: #a3acb8;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --border: #2c3038;
    }
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }

  h1 {
    font-size: 1.5rem;
    margin: 0 0 4px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.95rem;
    margin: 0 0 28px;
  }

  label {
    display: block;
    font-size: 0.875rem;
    font-weight: 600;
    margin-bottom: 6px;
    margin-top: 18px;
  }

  input, textarea {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.95rem;
    font-family: inherit;
  }

  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  textarea {
    resize: vertical;
    min-height: 120px;
  }

  button {
    margin-top: 26px;
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  button:hover {
    background: var(--accent-hover);
  }

  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .status {
    margin-top: 14px;
    font-size: 0.875rem;
    display: none;
  }

  .status.show {
    display: block;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Ta kontakt</h1>
    <p class="subtitle">Fyll ut skjemaet, så sender vi meldingen din direkte.</p>

    <form id="contactForm">
      <label for="name">Navn</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Din e-post</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Melding</label>
      <textarea id="message" name="message" required></textarea>

      <button type="submit" id="submitBtn">Send melding</button>
      <p class="status" id="status"></p>
    </form>

    <div class="footer">
      Eikefet IT Utvikling (ENK)<br>
      E-post: <a href="mailto:it_utvikling@martineikefet.dev">it_utvikling@martineikefet.dev</a><br>
      Telefon: <a href="tel:+4740616483">406 16 483</a>
    </div>
  </div>

<script>
  const form = document.getElementById('contactForm');
  const status = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const message = document.getElementById('message').value.trim();

    submitBtn.disabled = true;
    submitBtn.textContent = 'Sender...';
    status.classList.remove('show');

    try {
      const response = await fetch('/api/contact', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, message }),
      });

      if (!response.ok) {
        throw new Error('Request failed');
      }

      status.textContent = 'Takk! Meldingen din er sendt.';
      status.classList.add('show');
      form.reset();
    } catch (err) {
      status.textContent = 'Noe gikk galt. Prøv igjen, eller send oss en e-post direkte.';
      status.classList.add('show');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Send melding';
    }
  });
</script>
</body>
</html>
